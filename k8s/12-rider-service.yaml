apiVersion: apps/v1
kind: Deployment
metadata:
  name: rider-service
  namespace: ride-hailing
spec:
  replicas: 1
  selector:
    matchLabels:
      app: rider-service
  template:
    metadata:
      labels:
        app: rider-service
    spec:
      containers:
        - name: rider-service
          image: rider-service:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 8081
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8081
            initialDelaySeconds: 30
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8081
            initialDelaySeconds: 45
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: rider-service
  namespace: ride-hailing
spec:
  type: NodePort
  selector:
    app: rider-service
  ports:
    - name: http
      port: 8081
      targetPort: 8081
      nodePort: 30081
